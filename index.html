<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio | 黄俊德作品集</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #f8fafc;
      --bg-card: rgba(0, 0, 0, 0.03);
      --bg-card-hover: rgba(0, 0, 0, 0.06);
      --text-primary: #0a0a0a;
      --text-secondary: rgba(0, 0, 0, 0.6);
      --text-muted: rgba(0, 0, 0, 0.4);
      --accent-cyan: #0077b5;
      --accent-purple: #6366f1;
      --accent-pink: #ec4899;
      --accent-green: #10b981;
      --border-subtle: rgba(0, 0, 0, 0.08);
      --border-glow: rgba(0, 0, 0, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: "Alibaba PuHuiTi 3.0", "Alibaba PuHuiTi 2.0", "Alibaba PuHuiTi", "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Microsoft YaHei", "PingFang SC", sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      line-height: 1.5;
    }

    /* 动态渐变背景 */
    .gradient-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: var(--bg-dark);
    }

    .gradient-bg::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(0, 119, 181, 0.08) 0%, transparent 40%),
        radial-gradient(ellipse at 80% 80%, rgba(99, 102, 241, 0.06) 0%, transparent 40%),
        radial-gradient(ellipse at 60% 30%, rgba(236, 72, 153, 0.04) 0%, transparent 30%);
      animation: gradientShift 15s ease-in-out infinite;
    }

    @keyframes gradientShift {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(2%, 2%) rotate(1deg); }
      66% { transform: translate(-1%, 1%) rotate(-1deg); }
    }

    /* 网格背景 */
    .grid-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background-image: 
        linear-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 0%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 0%, transparent 70%);
    }

    /* 背景视频 */
    .bg-video {
      position: fixed;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%);
      z-index: -1;
      object-fit: cover;
      opacity: 0.5;
    }

    .video-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background: linear-gradient(135deg, 
        rgba(248, 250, 252, 0.85) 0%, 
        rgba(248, 250, 252, 0.75) 50%,
        rgba(248, 250, 252, 0.85) 100%);
      pointer-events: none;
    }

    /* 焦点光晕 */
    .glow-point {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 119, 181, 0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      transition: opacity 0.5s ease;
    }

    /* 主容器 - 居中布局 */
    .container {
      position: relative;
      width: 100%;
      height: 100vh;
      padding: 40px 60px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      z-index: 1;
    }

    /* 主内容区 */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      animation: fadeSlideUp 1s ease-out 0.2s both;
      flex: 1;
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero-title {
      text-align: center;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 100px;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 24px;
      width: fit-content;
      backdrop-filter: blur(10px);
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      background: var(--accent-green);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
    }

    .hero-title {
      font-size: clamp(48px, 8vw, 100px);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -3px;
      margin-top: 60px;
      margin-bottom: 24px;
      background: linear-gradient(135deg, #0a0a0a 0%, rgba(0, 0, 0, 0.7) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-title-img {
      width: auto;
      height: clamp(48px, 8vw, 100px);
      max-width: 100%;
      object-fit: contain;
      filter: drop-shadow(0 0 30px rgba(0, 119, 181, 0.2));
    }

    .hero-description {
      font-size: 18px;
      color: var(--text-secondary);
      max-width: 480px;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    .hero-cta {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 32px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      overflow: hidden;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      color: white;
      border: none;
      box-shadow: 0 4px 24px rgba(0, 119, 181, 0.2);
    }

    .btn-primary:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 8px 40px rgba(0, 119, 181, 0.25);
    }

    .btn-secondary {
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border-subtle);
      backdrop-filter: blur(10px);
    }

    .btn-secondary:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-glow);
      transform: translateY(-3px);
    }

    .btn-arrow {
      transition: transform 0.3s ease;
    }

    .btn:hover .btn-arrow {
      transform: translateX(4px);
    }

    /* 底部信息 */
    .footer {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 16px;
      animation: fadeSlideUp 1s ease-out 0.6s both;
    }

    .contact-info {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.3s ease;
    }

    .contact-item:hover {
      color: var(--text-primary);
    }

    /* 装饰性元素 */
    @media (max-width: 1024px) {
      .container {
        padding: 24px;
      }
    }

    @media (max-width: 768px) {
      .hero-title {
        font-size: 42px;
        letter-spacing: -1px;
      }

      .hero-description {
        font-size: 16px;
      }

      .hero-cta {
        flex-direction: column;
      }

      .btn {
        width: 100%;
        justify-content: center;
      }

      .footer {
        flex-direction: column;
        gap: 20px;
        text-align: center;
      }

      .contact-info {
        flex-direction: column;
        gap: 12px;
      }
    }

    @media (orientation: portrait) {
      .bg-image {
        opacity: 0 !important;
        z-index: -1 !important;
      }
    }

    /* 背景图片 */
    .bg-image {
      position: fixed;
      z-index: 100;
      opacity: 0.15;
      transition: opacity 0.5s ease;
      object-fit: cover;
    }

    .bg-image:hover {
      opacity: 1;
    }

    .bg-image-1 {
      top: 5%;
      left: 5%;
      width: 220px;
      height: auto;
      animation: float 12s ease-in-out infinite;
    }

    .bg-image-2 {
      bottom: 5%;
      right: 5%;
      width: 260px;
      height: auto;
      animation: float 14s ease-in-out infinite reverse;
    }

    .bg-image-3 {
      bottom: 5%;
      left: 5%;
      width: 200px;
      height: auto;
      animation: float 16s ease-in-out infinite;
    }

    .bg-image-4 {
      top: 5%;
      right: 5%;
      width: 240px;
      height: auto;
      animation: float 18s ease-in-out infinite reverse;
    }

    /* 装饰性元素 */
    .decoration {
      position: fixed;
      pointer-events: none;
      z-index: 0;
    }

    .decoration-1 {
      top: 10%;
      right: 5%;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, transparent 70%);
      filter: blur(40px);
      animation: float 8s ease-in-out infinite;
    }

    .decoration-2 {
      bottom: 20%;
      left: 10%;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(0, 119, 181, 0.12) 0%, transparent 70%);
      filter: blur(40px);
      animation: float 10s ease-in-out infinite reverse;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(20px, -20px); }
    }
  </style>
</head>
<body>
  <div class="gradient-bg"></div>
  <div class="grid-bg"></div>
  
  <!-- 背景视频 -->
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="https://jointek-1428336988.cos.ap-guangzhou.myqcloud.com/Videos/Animation_Portfolio.mp4" type="video/mp4">
  </video>
  <div class="video-overlay"></div>
  <div class="glow-point" id="glowPoint"></div>
  
  <div class="decoration decoration-1"></div>
  <div class="decoration decoration-2"></div>

  <!-- 背景图片 -->
  <img src="https://jointek-1428336988.cos.ap-guangzhou.myqcloud.com/img/shoemate_index.webp" alt="" class="bg-image bg-image-1">
  <img src="https://jointek-1428336988.cos.ap-guangzhou.myqcloud.com/img/qispace_index.webp" alt="" class="bg-image bg-image-2">
  <img src="https://jointek-1428336988.cos.ap-guangzhou.myqcloud.com/img/emsky_index.webp" alt="" class="bg-image bg-image-3">
  <img src="https://jointek-1428336988.cos.ap-guangzhou.myqcloud.com/img/mrxa_index.webp" alt="" class="bg-image bg-image-4">

  <div class="container">
    <main class="hero">
      <h1 class="hero-title">
        <img src="https://jointek-1428336988.cos.ap-guangzhou.myqcloud.com/img/Portfolio.webp" alt="Portfolio" class="hero-title-img">
      </h1>
      
      <p class="hero-description">
        工业设计 | 3D设计 | 汽车可视化设计<br>
      </p>
      
      <div class="hero-cta">
        <a href="contents.html" class="btn btn-primary">
          工业设计作品集
          <span class="btn-arrow">→</span>
        </a>
        <a href="car-render.html" class="btn btn-primary">
          汽车渲染作品集
          <span class="btn-arrow">→</span>
        </a>
        <a href="resume.html" class="btn btn-secondary">
          个人简历
          <span class="btn-arrow">→</span>
        </a>
      </div>
    </main>

    <footer class="footer">
      <div class="contact-info">
        <a href="mailto:2694529167@qq.com" class="contact-item">
          <span>✉</span>
          <span>2694529167@qq.com</span>
        </a>
        <a href="tel:18566402338" class="contact-item">
          <span>📱</span>
          <span>18566402338</span>
        </a>
      </div>
    </footer>
  </div>

  <script>
    // 焦点光晕跟随鼠标
    const glowPoint = document.getElementById('glowPoint');
    
    document.addEventListener('mousemove', (e) => {
      const x = e.clientX - 300;
      const y = e.clientY - 300;
      glowPoint.style.left = `${x}px`;
      glowPoint.style.top = `${y}px`;
    });

    // 页面加载动画
    document.addEventListener('DOMContentLoaded', () => {
      document.body.style.opacity = '1';
    });

    document.body.style.opacity = '0';
    document.body.style.transition = 'opacity 0.5s ease';
  </script>
</body>
</html>
