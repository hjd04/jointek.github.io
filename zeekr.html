<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>极氪 001 - Zeekr 001</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Noto Sans SC', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #1a1a2e;
      color: #ffffff;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 100vh;
      padding: 100px 40px 60px;
    }

    .back-button {
      position: fixed;
      top: 40px;
      left: 40px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #ffffff;
      font-size: 18px;
      cursor: pointer;
      transition: opacity 0.3s ease;
      text-decoration: none;
      z-index: 100;
    }

    .back-button:hover {
      opacity: 0.8;
    }

    .back-arrow {
      width: 24px;
      height: 24px;
    }

    .title-area {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 8px;
    }

    .title-logo {
      height: 36px;
      width: auto;
    }

    .project-title {
      font-size: 32px;
      font-weight: 700;
      color: #ffffff;
    }

    .project-subtitle {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.7);
      text-align: center;
      margin-bottom: 40px;
    }

    .image-grid {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .image-item {
      width: 100%;
      max-width: 1400px;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .image-item:hover {
      transform: scale(1.01);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .image-item img {
      width: 100%;
      height: auto;
      border-radius: 12px;
      display: block;
    }

    /* 图片查看器 */
    .image-viewer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 1000;
      display: none;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .image-viewer.active {
      display: flex;
      opacity: 1;
    }

    .viewer-container {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .viewer-image {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
      cursor: grab;
      transition: transform 0.1s ease-out;
      user-select: none;
    }

    .viewer-image:active {
      cursor: grabbing;
    }

    .viewer-image.zoomed {
      cursor: grab;
    }

    .viewer-close {
      position: absolute;
      top: 20px;
      right: 30px;
      width: 50px;
      height: 50px;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background 0.3s ease;
      z-index: 1001;
    }

    .viewer-close:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .viewer-close svg {
      width: 24px;
      height: 24px;
      stroke: #ffffff;
    }

    .viewer-controls {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
      z-index: 1001;
    }

    .viewer-btn {
      width: 44px;
      height: 44px;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background 0.3s ease;
    }

    .viewer-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .viewer-btn svg {
      width: 20px;
      height: 20px;
      stroke: #ffffff;
    }

    .viewer-hint {
      position: absolute;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.5);
      font-size: 14px;
      pointer-events: none;
    }

    @media (max-width: 768px) {
      .project-title {
        font-size: 24px;
      }
      
      .title-logo {
        height: 28px;
      }
      
      .container {
        padding: 80px 20px 40px;
      }
      
      .back-button {
        top: 20px;
        left: 20px;
      }

      .viewer-close {
        top: 10px;
        right: 20px;
        width: 40px;
        height: 40px;
      }

      .viewer-controls {
        bottom: 20px;
      }

      .viewer-btn {
        width: 40px;
        height: 40px;
      }
    }
  </style>
</head>
<body>

  <!-- 图片查看器 -->
  <div class="image-viewer" id="imageViewer">
    <div class="viewer-container">
      <img class="viewer-image" id="viewerImage" src="" alt="">
    </div>
    <button class="viewer-close" id="viewerClose">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
    <div class="viewer-controls">
      <button class="viewer-btn" id="zoomOutBtn" title="缩小">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="M21 21l-4.35-4.35M8 11h6"/>
        </svg>
      </button>
      <button class="viewer-btn" id="zoomInBtn" title="放大">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="M21 21l-4.35-4.35M11 8v6M8 11h6"/>
        </svg>
      </button>
      <button class="viewer-btn" id="resetBtn" title="重置">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
        </svg>
      </button>
    </div>
    <p class="viewer-hint">滚轮缩放 · 拖动查看 · ESC关闭</p>
  </div>

  <script>
    (function() {
      const viewer = document.getElementById('imageViewer');
      const viewerImage = document.getElementById('viewerImage');
      const viewerClose = document.getElementById('viewerClose');
      const zoomInBtn = document.getElementById('zoomInBtn');
      const zoomOutBtn = document.getElementById('zoomOutBtn');
      const resetBtn = document.getElementById('resetBtn');
      const imageItems = document.querySelectorAll('.image-item');

      let scale = 1;
      let minScale = 0.5;
      let maxScale = 5;
      let isDragging = false;
      let startX, startY, translateX = 0, translateY = 0;

      imageItems.forEach(item => {
        item.addEventListener('click', function() {
          const img = this.querySelector('img');
          viewerImage.src = img.src;
          viewerImage.alt = img.alt;
          resetView();
          viewer.classList.add('active');
          document.body.style.overflow = 'hidden';
        });
      });

      function closeViewer() {
        viewer.classList.remove('active');
        document.body.style.overflow = '';
        resetView();
      }

      function resetView() {
        scale = 1;
        translateX = 0;
        translateY = 0;
        updateTransform();
      }

      function updateTransform() {
        if (scale > 1) {
          viewerImage.classList.add('zoomed');
        } else {
          viewerImage.classList.remove('zoomed');
        }
        viewerImage.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
      }

      function zoomIn() {
        if (scale < maxScale) {
          scale = Math.min(scale * 1.2, maxScale);
          updateTransform();
        }
      }

      function zoomOut() {
        if (scale > minScale) {
          scale = Math.max(scale / 1.2, minScale);
          if (scale <= 1) {
            translateX = 0;
            translateY = 0;
          }
          updateTransform();
        }
      }

      viewerClose.addEventListener('click', closeViewer);
      zoomInBtn.addEventListener('click', zoomIn);
      zoomOutBtn.addEventListener('click', zoomOut);
      resetBtn.addEventListener('click', resetView);

      viewer.addEventListener('click', function(e) {
        if (e.target === viewer || e.target.closest('.viewer-container') === e.target) {
          closeViewer();
        }
      });

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && viewer.classList.contains('active')) {
          closeViewer();
        }
      });

      viewerImage.addEventListener('wheel', function(e) {
        e.preventDefault();
        if (e.deltaY < 0) {
          zoomIn();
        } else {
          zoomOut();
        }
      }, { passive: false });

      viewerImage.addEventListener('mousedown', function(e) {
        if (scale > 1) {
          isDragging = true;
          startX = e.clientX - translateX;
          startY = e.clientY - translateY;
          viewerImage.style.cursor = 'grabbing';
        }
      });

      document.addEventListener('mousemove', function(e) {
        if (isDragging && scale > 1) {
          translateX = e.clientX - startX;
          translateY = e.clientY - startY;
          updateTransform();
        }
      });

      document.addEventListener('mouseup', function() {
        isDragging = false;
        viewerImage.style.cursor = 'grab';
      });

      let touchStartX, touchStartY, touchStartScale;
      viewerImage.addEventListener('touchstart', function(e) {
        if (e.touches.length === 1) {
          touchStartX = e.touches[0].clientX - translateX;
          touchStartY = e.touches[0].clientY - translateY;
        } else if (e.touches.length === 2) {
          touchStartScale = scale;
        }
      }, { passive: true });

      viewerImage.addEventListener('touchmove', function(e) {
        e.preventDefault();
        if (e.touches.length === 1 && scale > 1) {
          translateX = e.touches[0].clientX - touchStartX;
          translateY = e.touches[0].clientY - touchStartY;
          updateTransform();
        } else if (e.touches.length === 2) {
          const dist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
          );
          const startDist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
          );
          scale = Math.min(Math.max(touchStartScale * (dist / startDist), minScale), maxScale);
          updateTransform();
        }
      }, { passive: false });
    })();
  </script>
