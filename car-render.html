<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>汽车渲染作品目录 | Car Render Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #f8fafc;
      --bg-card: rgba(0, 0, 0, 0.03);
      --bg-card-hover: rgba(0, 0, 0, 0.06);
      --text-primary: #0a0a0a;
      --text-secondary: rgba(0, 0, 0, 0.6);
      --text-muted: rgba(0, 0, 0, 0.4);
      --accent-cyan: #0077b5;
      --accent-purple: #6366f1;
      --accent-pink: #ec4899;
      --accent-green: #10b981;
      --border-subtle: rgba(0, 0, 0, 0.08);
      --border-glow: rgba(0, 0, 0, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: "Alibaba PuHuiTi 3.0", "Alibaba PuHuiTi 2.0", "Alibaba PuHuiTi", "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Microsoft YaHei", "PingFang SC", sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      line-height: 1.5;
    }

    /* 动态渐变背景 */
    .gradient-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: var(--bg-dark);
    }

    .gradient-bg::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(0, 119, 181, 0.08) 0%, transparent 40%),
        radial-gradient(ellipse at 80% 80%, rgba(99, 102, 241, 0.06) 0%, transparent 40%),
        radial-gradient(ellipse at 60% 30%, rgba(236, 72, 153, 0.04) 0%, transparent 30%);
      animation: gradientShift 15s ease-in-out infinite;
    }

    @keyframes gradientShift {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(2%, 2%) rotate(1deg); }
      66% { transform: translate(-1%, 1%) rotate(-1deg); }
    }

    /* 网格背景 */
    .grid-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background-image: 
        linear-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 0%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 0%, transparent 70%);
    }

    /* 焦点光晕 */
    .glow-point {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 119, 181, 0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      transition: opacity 0.5s ease;
    }

    /* 装饰性元素 */
    .decoration {
      position: fixed;
      pointer-events: none;
      z-index: 0;
    }

    .decoration-1 {
      top: 10%;
      right: 5%;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, transparent 70%);
      filter: blur(40px);
      animation: float 8s ease-in-out infinite;
    }

    .decoration-2 {
      bottom: 20%;
      left: 10%;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(0, 119, 181, 0.12) 0%, transparent 70%);
      filter: blur(40px);
      animation: float 10s ease-in-out infinite reverse;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(20px, -20px); }
    }

    /* 内容容器 */
    .container {
      position: relative;
      z-index: 1;
    }

    /* 返回按钮 */
    .back-button {
      position: absolute;
      top: 40px;
      left: 40px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text-dark);
      font-size: 18px;
      cursor: pointer;
      transition: opacity 0.3s ease;
      text-decoration: none;
      z-index: 10;
    }

    .back-button:hover {
      opacity: 0.7;
    }

    .back-arrow {
      width: 24px;
      height: 24px;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 80px 40px;
      position: relative;
      z-index: 1;
    }

    /* 头部区域 */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 80px;
      padding: 0 20px;
    }

    .header-title {
      font-size: 42px;
      font-weight: 600;
      color: var(--text-dark);
      letter-spacing: 1px;
    }

    .header-subtitle {
      font-size: 32px;
      color: var(--text-light);
      font-weight: 300;
      font-family: 'Inter', sans-serif;
      letter-spacing: 2px;
    }

    /* 作品网格 */
    .works-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 60px;
      padding: 0 15px;
      max-width: 1400px;
      margin-left: auto;
      margin-right: auto;
    }

    /* 作品卡片 */
    .work-card {
      flex: 0 0 calc(20% - 20px);
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transition: transform 0.3s ease;
      min-width: 200px;
    }

    .work-card:hover {
      transform: translateY(-8px);
    }

    /* 作品图片 */
    .work-image {
      width: 100%;
      height: 450px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 24px;
      box-shadow: 0 4px 24px rgba(0, 119, 181, 0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      max-width: 100%;
      min-width: 100%;
    }

    /* 响应式图片高度 */
    @media (max-width: 1200px) {
      .work-image {
        height: 400px;
      }
    }

    @media (max-width: 768px) {
      .work-image {
        height: 350px;
      }
      .work-card {
        flex: 0 0 calc(33.33% - 20px);
      }
    }

    @media (max-width: 480px) {
      .work-image {
        height: 300px;
      }
      .work-card {
        flex: 0 0 calc(50% - 20px);
      }
    }

    .work-card:hover .work-image {
      transform: scale(1.02);
      box-shadow: 0 8px 32px rgba(0, 119, 181, 0.15);
    }

    /* 作品标题 */
    .work-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-dark);
      margin-bottom: 16px;
      line-height: 1.4;
    }

    /* 奖项标志容器 */
    .work-awards {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .award-logo {
      height: 24px;
      object-fit: contain;
      opacity: 0.9;
      transition: opacity 0.2s ease;
    }

    .award-logo:hover {
      opacity: 1;
    }

    /* 响应式设计 */
    @media (max-width: 900px) {
      .container {
        padding: 40px 20px;
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }
    }

    @media (max-width: 600px) {
      .container {
        padding: 30px 16px;
      }

      .header-title {
        font-size: 28px;
      }

      .header-subtitle {
        font-size: 20px;
      }
    }

    /* 竖屏模式响应式布局 */
    @media (orientation: portrait) {
      .header {
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 0;
        margin-bottom: 40px;
      }

      .header-title {
        font-size: 32px;
      }

      .header-subtitle {
        font-size: 24px;
      }

      .back-button {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 100;
      }

      .container {
        padding-top: 80px;
      }
    }

    /* 极窄屏幕竖屏模式 */
    @media (orientation: portrait) and (max-width: 400px) {
      .header-title {
        font-size: 26px;
      }

      .header-subtitle {
        font-size: 18px;
      }

      .work-image {
        height: 180px;
      }

      .work-title {
        font-size: 13px;
      }
    }
  </style>
</head>

  <script>
    // 焦点光晕跟随鼠标
    const glowPoint = document.getElementById('glowPoint');
    
    document.addEventListener('mousemove', (e) => {
      const x = e.clientX - 300;
      const y = e.clientY - 300;
      glowPoint.style.left = `${x}px`;
      glowPoint.style.top = `${y}px`;
    });
